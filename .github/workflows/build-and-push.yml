name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: sha-${{ github.sha }}
  HOMELAB_REPO: nilsherzig/k3s-homelab
  HOMELAB_KUSTOMIZATION_FILE: overlays/remote/workloads/kustomization.yaml
  HOMELAB_IMAGE_NAME: ghcr.io/nilsherzig/website

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-homelab:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMELAB_REPO }}
          token: ${{ secrets.K3S_HOMELAB_PUSH_TOKEN }}
          path: k3s-homelab

      - name: Update website image tag
        uses: mikefarah/yq@v4
        env:
          HOMELAB_IMAGE_NAME: ${{ env.HOMELAB_IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          cmd: >-
            yq -i '
              (.images[] | select(.name == env(HOMELAB_IMAGE_NAME)) | .newTag) = env(IMAGE_TAG)
            ' "k3s-homelab/${{ env.HOMELAB_KUSTOMIZATION_FILE }}"

      - name: Validate website image tag entry
        uses: mikefarah/yq@v4
        env:
          HOMELAB_IMAGE_NAME: ${{ env.HOMELAB_IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          cmd: >-
            test "$(yq '.images[] | select(.name == env(HOMELAB_IMAGE_NAME)) | .newTag' "k3s-homelab/${{ env.HOMELAB_KUSTOMIZATION_FILE }}")" = "$IMAGE_TAG"

      - name: Commit and push manifest update
        working-directory: k3s-homelab
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${{ env.HOMELAB_KUSTOMIZATION_FILE }}"; then
            exit 0
          fi

          git add "${{ env.HOMELAB_KUSTOMIZATION_FILE }}"
          git commit -m "Deploy website ${IMAGE_TAG}"
          git push
